<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AL BURHAN TOURS - Admin Dashboard</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #F0FDF4; color: #1a1a1a; }
    .header { background: #047857; color: white; padding: 20px 32px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 8px rgba(0,0,0,0.15); }
    .header h1 { font-size: 22px; font-weight: 700; }
    .header span { font-size: 13px; color: #D97706; }
    .nav { background: #065f46; display: flex; gap: 0; padding: 0 32px; }
    .nav button { background: none; border: none; color: #a7f3d0; padding: 14px 24px; font-size: 14px; font-weight: 600; cursor: pointer; border-bottom: 3px solid transparent; transition: all 0.2s; }
    .nav button:hover { color: white; background: rgba(255,255,255,0.1); }
    .nav button.active { color: white; border-bottom-color: #D97706; background: rgba(255,255,255,0.05); }
    .content { max-width: 1200px; margin: 0 auto; padding: 24px; }
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 24px; }
    .stat-card { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
    .stat-card .label { font-size: 13px; color: #6b7280; margin-bottom: 8px; font-weight: 500; }
    .stat-card .value { font-size: 28px; font-weight: 700; color: #047857; }
    .stat-card .value.orange { color: #D97706; }
    .stat-card .value.blue { color: #2563eb; }
    .stat-card .value.red { color: #dc2626; }
    .card { background: white; border-radius: 12px; padding: 24px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); margin-bottom: 24px; }
    .card h2 { font-size: 18px; font-weight: 700; margin-bottom: 16px; color: #047857; }
    table { width: 100%; border-collapse: collapse; font-size: 14px; }
    th { text-align: left; padding: 12px 16px; background: #f9fafb; border-bottom: 2px solid #e5e7eb; font-weight: 600; color: #374151; white-space: nowrap; }
    td { padding: 12px 16px; border-bottom: 1px solid #f3f4f6; }
    tr:hover td { background: #f0fdf4; }
    .badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; text-transform: uppercase; }
    .badge-pending { background: #fef3c7; color: #92400e; }
    .badge-confirmed { background: #d1fae5; color: #065f46; }
    .badge-cancelled { background: #fee2e2; color: #991b1b; }
    .badge-completed { background: #dbeafe; color: #1e40af; }
    .badge-partial { background: #fef3c7; color: #92400e; }
    .badge-success { background: #d1fae5; color: #065f46; }
    .badge-failed { background: #fee2e2; color: #991b1b; }
    .btn { padding: 6px 16px; border: none; border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
    .btn-confirm { background: #047857; color: white; }
    .btn-confirm:hover { background: #065f46; }
    .btn-cancel { background: #dc2626; color: white; }
    .btn-cancel:hover { background: #b91c1c; }
    .btn-group { display: flex; gap: 8px; }
    .section { display: none; }
    .section.active { display: block; }
    .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .detail-item { padding: 12px 0; border-bottom: 1px solid #f3f4f6; }
    .detail-item .dlabel { font-size: 12px; color: #6b7280; font-weight: 500; margin-bottom: 4px; }
    .detail-item .dvalue { font-size: 15px; font-weight: 600; color: #1a1a1a; }
    .travelers-list { margin-top: 16px; }
    .traveler-card { background: #f9fafb; border-radius: 8px; padding: 12px 16px; margin-bottom: 8px; }
    .traveler-card .tname { font-weight: 600; color: #047857; }
    .traveler-card .tinfo { font-size: 13px; color: #6b7280; margin-top: 4px; }
    .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); display: flex; justify-content: center; align-items: center; z-index: 1000; }
    .modal { background: white; border-radius: 16px; padding: 32px; max-width: 700px; width: 90%; max-height: 85vh; overflow-y: auto; }
    .modal h2 { margin-bottom: 20px; }
    .modal .close-btn { float: right; background: none; border: none; font-size: 24px; cursor: pointer; color: #6b7280; }
    .empty-state { text-align: center; padding: 60px 20px; color: #6b7280; }
    .empty-state p { font-size: 16px; }
    .refresh-btn { background: #047857; color: white; border: none; padding: 8px 20px; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; }
    .refresh-btn:hover { background: #065f46; }
    @media (max-width: 768px) {
      .content { padding: 16px; }
      .stats-grid { grid-template-columns: repeat(2, 1fr); }
      .detail-grid { grid-template-columns: 1fr; }
      table { font-size: 12px; }
      th, td { padding: 8px; }
      .nav { overflow-x: auto; padding: 0 16px; }
      .nav button { white-space: nowrap; padding: 12px 16px; font-size: 13px; }
    }
  </style>
</head>
<body>
  <div class="header">
    <div>
      <h1>AL BURHAN TOURS & TRAVELS</h1>
      <span>Admin Dashboard</span>
    </div>
    <button class="refresh-btn" onclick="loadAll()">Refresh</button>
  </div>

  <div class="nav">
    <button class="active" onclick="showSection('dashboard', this)">Dashboard</button>
    <button onclick="showSection('bookings', this)">Bookings</button>
    <button onclick="showSection('customers', this)">Customers</button>
    <button onclick="showSection('payments', this)">Payments</button>
    <button onclick="showSection('packages', this)">Packages</button>
  </div>

  <div class="content">
    <div id="section-dashboard" class="section active">
      <div class="stats-grid" id="stats-grid"></div>
      <div class="card">
        <h2>Recent Bookings</h2>
        <div id="recent-bookings"></div>
      </div>
    </div>

    <div id="section-bookings" class="section">
      <div class="card">
        <h2>All Bookings</h2>
        <div id="all-bookings"></div>
      </div>
    </div>

    <div id="section-customers" class="section">
      <div class="card">
        <h2>All Customers</h2>
        <div id="all-customers"></div>
      </div>
    </div>

    <div id="section-payments" class="section">
      <div class="card">
        <h2>Payment History</h2>
        <div id="all-payments"></div>
      </div>
    </div>

    <div id="section-packages" class="section">
      <div class="card">
        <h2>Packages</h2>
        <div id="all-packages"></div>
      </div>
    </div>
  </div>

  <div id="modal-container"></div>

  <script>
    const API = window.location.origin;

    function formatPrice(amount) {
      return new Intl.NumberFormat('en-IN', { style: 'currency', currency: 'INR', maximumFractionDigits: 0 }).format(parseFloat(amount || 0));
    }

    function formatDate(d) {
      if (!d) return '-';
      return new Date(d).toLocaleDateString('en-IN', { year: 'numeric', month: 'short', day: 'numeric' });
    }

    function getBadgeClass(status) {
      const map = { pending: 'badge-pending', confirmed: 'badge-confirmed', cancelled: 'badge-cancelled', completed: 'badge-completed', partial: 'badge-partial', success: 'badge-success', failed: 'badge-failed' };
      return map[status] || 'badge-pending';
    }

    function showSection(name, btn) {
      document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
      document.querySelectorAll('.nav button').forEach(b => b.classList.remove('active'));
      document.getElementById('section-' + name).classList.add('active');
      if (btn) btn.classList.add('active');
    }

    async function fetchJSON(url) {
      const res = await fetch(API + url);
      return res.json();
    }

    async function loadStats() {
      const data = await fetchJSON('/api/admin/stats');
      if (!data.success) return;
      const s = data.stats;
      document.getElementById('stats-grid').innerHTML = `
        <div class="stat-card"><div class="label">Total Bookings</div><div class="value">${s.totalBookings}</div></div>
        <div class="stat-card"><div class="label">Total Customers</div><div class="value blue">${s.totalCustomers}</div></div>
        <div class="stat-card"><div class="label">Total Revenue</div><div class="value">${formatPrice(s.totalRevenue)}</div></div>
        <div class="stat-card"><div class="label">Pending Bookings</div><div class="value orange">${s.pendingBookings}</div></div>
        <div class="stat-card"><div class="label">Confirmed Bookings</div><div class="value">${s.confirmedBookings}</div></div>
        <div class="stat-card"><div class="label">Total Payments</div><div class="value blue">${s.totalPayments}</div></div>
      `;
    }

    async function loadBookings() {
      const data = await fetchJSON('/api/admin/bookings');
      if (!data.success) return;
      const bookings = data.bookings;

      if (bookings.length === 0) {
        document.getElementById('recent-bookings').innerHTML = '<div class="empty-state"><p>No bookings yet</p></div>';
        document.getElementById('all-bookings').innerHTML = '<div class="empty-state"><p>No bookings yet</p></div>';
        return;
      }

      const renderTable = (list) => `
        <table>
          <thead><tr><th>ID</th><th>Contact</th><th>Phone</th><th>Travelers</th><th>Total</th><th>Paid</th><th>Status</th><th>Payment</th><th>Date</th><th>Actions</th></tr></thead>
          <tbody>
            ${list.map(b => `
              <tr>
                <td><strong>#${b.id}</strong></td>
                <td>${b.contactName || '-'}</td>
                <td>${b.contactPhone || '-'}</td>
                <td>${b.numberOfPeople}</td>
                <td>${formatPrice(b.totalAmount)}</td>
                <td>${formatPrice(b.paidAmount)}</td>
                <td><span class="badge ${getBadgeClass(b.status)}">${b.status}</span></td>
                <td><span class="badge ${getBadgeClass(b.paymentStatus)}">${b.paymentStatus}</span></td>
                <td>${formatDate(b.bookingDate)}</td>
                <td>
                  <div class="btn-group">
                    <button class="btn btn-confirm" onclick="viewBooking(${b.id})">View</button>
                    ${b.status === 'pending' ? `<button class="btn btn-confirm" onclick="updateStatus(${b.id}, 'confirmed')">Confirm</button><button class="btn btn-cancel" onclick="updateStatus(${b.id}, 'cancelled')">Cancel</button>` : ''}
                  </div>
                </td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      `;

      document.getElementById('recent-bookings').innerHTML = renderTable(bookings.slice(0, 5));
      document.getElementById('all-bookings').innerHTML = renderTable(bookings);
    }

    async function loadCustomers() {
      const data = await fetchJSON('/api/admin/customers');
      if (!data.success) return;
      const customers = data.customers;

      if (customers.length === 0) {
        document.getElementById('all-customers').innerHTML = '<div class="empty-state"><p>No customers yet</p></div>';
        return;
      }

      document.getElementById('all-customers').innerHTML = `
        <table>
          <thead><tr><th>ID</th><th>Name</th><th>Email</th><th>Phone</th><th>Joined</th></tr></thead>
          <tbody>
            ${customers.map(c => `
              <tr>
                <td>#${c.id}</td>
                <td><strong>${c.name}</strong></td>
                <td>${c.email}</td>
                <td>${c.phone}</td>
                <td>${formatDate(c.createdAt)}</td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      `;
    }

    async function loadPayments() {
      const data = await fetchJSON('/api/admin/payments');
      if (!data.success) return;
      const payments = data.payments;

      if (payments.length === 0) {
        document.getElementById('all-payments').innerHTML = '<div class="empty-state"><p>No payments yet</p></div>';
        return;
      }

      document.getElementById('all-payments').innerHTML = `
        <table>
          <thead><tr><th>ID</th><th>Booking</th><th>Amount</th><th>Method</th><th>Transaction ID</th><th>Status</th><th>Date</th></tr></thead>
          <tbody>
            ${payments.map(p => `
              <tr>
                <td>#${p.id}</td>
                <td>#${p.bookingId}</td>
                <td><strong>${formatPrice(p.amount)}</strong></td>
                <td>${p.paymentMethod}</td>
                <td style="font-size:12px;word-break:break-all">${p.transactionId || p.razorpayPaymentId || '-'}</td>
                <td><span class="badge ${getBadgeClass(p.status)}">${p.status}</span></td>
                <td>${formatDate(p.paymentDate)}</td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      `;
    }

    async function loadPackages() {
      const data = await fetchJSON('/api/packages');
      if (!data.success) return;
      const pkgs = data.packages;

      document.getElementById('all-packages').innerHTML = `
        <table>
          <thead><tr><th>ID</th><th>Name</th><th>Type</th><th>Price</th><th>Duration</th><th>Seats</th><th>Departure</th><th>Featured</th></tr></thead>
          <tbody>
            ${pkgs.map(p => `
              <tr>
                <td>#${p.id}</td>
                <td><strong>${p.name}</strong></td>
                <td><span class="badge ${p.type === 'hajj' ? 'badge-confirmed' : 'badge-completed'}">${p.type.toUpperCase()}</span></td>
                <td>${formatPrice(p.price)}</td>
                <td>${p.duration}</td>
                <td>${p.availableSeats}</td>
                <td>${formatDate(p.departureDate)}</td>
                <td>${p.featured ? 'Yes' : 'No'}</td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      `;
    }

    async function viewBooking(id) {
      const data = await fetchJSON('/api/bookings/' + id);
      if (!data.success) return;
      const b = data.booking;
      const travelers = b.travelers || [];

      document.getElementById('modal-container').innerHTML = `
        <div class="modal-overlay" onclick="if(event.target===this)closeModal()">
          <div class="modal">
            <button class="close-btn" onclick="closeModal()">&times;</button>
            <h2>Booking #${b.id} Details</h2>
            <div class="detail-grid">
              <div class="detail-item"><div class="dlabel">Status</div><div class="dvalue"><span class="badge ${getBadgeClass(b.status)}">${b.status.toUpperCase()}</span></div></div>
              <div class="detail-item"><div class="dlabel">Payment Status</div><div class="dvalue"><span class="badge ${getBadgeClass(b.paymentStatus)}">${b.paymentStatus.toUpperCase()}</span></div></div>
              <div class="detail-item"><div class="dlabel">Contact Name</div><div class="dvalue">${b.contactName || '-'}</div></div>
              <div class="detail-item"><div class="dlabel">Phone</div><div class="dvalue">${b.contactPhone || '-'}</div></div>
              <div class="detail-item"><div class="dlabel">Email</div><div class="dvalue">${b.contactEmail || '-'}</div></div>
              <div class="detail-item"><div class="dlabel">Address</div><div class="dvalue">${b.address || '-'}</div></div>
              <div class="detail-item"><div class="dlabel">Number of Travelers</div><div class="dvalue">${b.numberOfPeople}</div></div>
              <div class="detail-item"><div class="dlabel">Booking Date</div><div class="dvalue">${formatDate(b.bookingDate)}</div></div>
              <div class="detail-item"><div class="dlabel">Total Amount</div><div class="dvalue" style="color:#047857;font-size:18px">${formatPrice(b.totalAmount)}</div></div>
              <div class="detail-item"><div class="dlabel">Paid Amount</div><div class="dvalue" style="color:#059669">${formatPrice(b.paidAmount)}</div></div>
              <div class="detail-item"><div class="dlabel">Remaining</div><div class="dvalue" style="color:#dc2626">${formatPrice(parseFloat(b.totalAmount) - parseFloat(b.paidAmount))}</div></div>
              <div class="detail-item"><div class="dlabel">Special Requests</div><div class="dvalue">${b.specialRequests || 'None'}</div></div>
            </div>
            ${travelers.length > 0 ? `
              <div class="travelers-list">
                <h3 style="margin-bottom:12px;color:#047857">Travelers</h3>
                ${travelers.map((t, i) => `
                  <div class="traveler-card">
                    <div class="tname">Traveler ${i + 1}: ${t.name}</div>
                    <div class="tinfo">Age: ${t.age} | Gender: ${t.gender || '-'} | Passport: ${t.passportNumber || '-'} | Expiry: ${t.passportExpiry || '-'}</div>
                  </div>
                `).join('')}
              </div>
            ` : ''}
            <div style="margin-top:20px;display:flex;gap:12px">
              ${b.status === 'pending' ? `
                <button class="btn btn-confirm" onclick="updateStatus(${b.id}, 'confirmed');closeModal()">Confirm Booking</button>
                <button class="btn btn-cancel" onclick="updateStatus(${b.id}, 'cancelled');closeModal()">Cancel Booking</button>
              ` : ''}
            </div>
          </div>
        </div>
      `;
    }

    function closeModal() {
      document.getElementById('modal-container').innerHTML = '';
    }

    async function updateStatus(id, status) {
      const res = await fetch(API + '/api/admin/bookings/' + id + '/status', {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ status })
      });
      const data = await res.json();
      if (data.success) {
        alert('Booking #' + id + ' updated to ' + status.toUpperCase());
        loadAll();
      } else {
        alert('Error: ' + (data.error || 'Could not update'));
      }
    }

    function loadAll() {
      loadStats();
      loadBookings();
      loadCustomers();
      loadPayments();
      loadPackages();
    }

    loadAll();
  </script>
</body>
</html>
