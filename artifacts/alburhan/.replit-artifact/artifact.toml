kind = "web"
previewPath = "/"
title = "Al Burhan Tours & Travels"
version = "1.0.0"
id = "artifacts/alburhan"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 22497
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/alburhan run dev"

[services.env]
PORT = "22497"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/alburhan", "run", "build"]
publicDir = "artifacts/alburhan/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
