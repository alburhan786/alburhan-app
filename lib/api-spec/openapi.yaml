openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Al Burhan Tours & Travels - Booking System API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication via OTP
  - name: packages
    description: Travel packages
  - name: bookings
    description: Booking management
  - name: payments
    description: Payment processing via Razorpay
  - name: documents
    description: Document uploads
  - name: notifications
    description: Notifications management
  - name: admin
    description: Admin operations
  - name: inquiry
    description: Public inquiry form
  - name: groups
    description: Hajj groups and pilgrim management (admin only)

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/send-otp:
    post:
      operationId: sendOtp
      tags: [auth]
      summary: Send OTP to mobile number
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendOtpRequest"
      responses:
        "200":
          description: OTP sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SendOtpResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/verify-otp:
    post:
      operationId: verifyOtp
      tags: [auth]
      summary: Verify OTP and login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VerifyOtpRequest"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid OTP
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout user
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user info
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /packages:
    get:
      operationId: listPackages
      tags: [packages]
      summary: List all travel packages
      parameters:
        - name: type
          in: query
          schema:
            type: string
            enum: [umrah, ramadan_umrah, hajj, special_hajj, iraq_ziyarat, baitul_muqaddas, syria_ziyarat, jordan_heritage]
        - name: active
          in: query
          schema:
            type: boolean
      responses:
        "200":
          description: List of packages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Package"

    post:
      operationId: createPackage
      tags: [packages]
      summary: Create a new package (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePackageRequest"
      responses:
        "201":
          description: Package created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Package"

  /packages/{id}:
    get:
      operationId: getPackage
      tags: [packages]
      summary: Get a single package
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Package details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Package"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    put:
      operationId: updatePackage
      tags: [packages]
      summary: Update a package (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePackageRequest"
      responses:
        "200":
          description: Package updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Package"

    delete:
      operationId: deletePackage
      tags: [packages]
      summary: Delete a package (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Package deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /bookings:
    get:
      operationId: listBookings
      tags: [bookings]
      summary: List bookings (admin sees all, customer sees own)
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, approved, rejected, confirmed, cancelled]
        - name: page
          in: query
          schema:
            type: number
        - name: limit
          in: query
          schema:
            type: number
      responses:
        "200":
          description: List of bookings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BookingListResponse"

    post:
      operationId: createBooking
      tags: [bookings]
      summary: Create a booking request
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBookingRequest"
      responses:
        "201":
          description: Booking created with pending status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Booking"

  /bookings/{id}:
    get:
      operationId: getBooking
      tags: [bookings]
      summary: Get booking details
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Booking details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Booking"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /bookings/{id}/approve:
    post:
      operationId: approveBooking
      tags: [bookings]
      summary: Approve a booking (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Booking approved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Booking"

  /bookings/{id}/reject:
    post:
      operationId: rejectBooking
      tags: [bookings]
      summary: Reject a booking (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                reason:
                  type: string
      responses:
        "200":
          description: Booking rejected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Booking"

  /bookings/{id}/invoice:
    get:
      operationId: getInvoice
      tags: [bookings]
      summary: Get invoice for a booking
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Invoice data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Invoice"

  /bookings/{id}/send-invoice:
    post:
      operationId: sendInvoiceNotification
      tags: [bookings]
      summary: Send invoice via WhatsApp and SMS to the customer
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Invoice notification sent
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  whatsapp:
                    type: boolean
                  sms:
                    type: boolean

  /bookings/offline:
    post:
      operationId: createOfflineBooking
      tags: [bookings]
      summary: Create an offline booking (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOfflineBookingRequest"
      responses:
        "201":
          description: Offline booking created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Booking"

  /payments/create-order:
    post:
      operationId: createPaymentOrder
      tags: [payments]
      summary: Create a Razorpay payment order
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePaymentOrderRequest"
      responses:
        "200":
          description: Razorpay order created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentOrder"

  /payments/verify:
    post:
      operationId: verifyPayment
      tags: [payments]
      summary: Verify and confirm payment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VerifyPaymentRequest"
      responses:
        "200":
          description: Payment verified, booking confirmed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Booking"

  /documents/upload-url:
    post:
      operationId: getUploadUrl
      tags: [documents]
      summary: Get a pre-signed URL to upload a document
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UploadUrlRequest"
      responses:
        "200":
          description: Upload URL generated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadUrlResponse"

  /documents/{bookingId}:
    get:
      operationId: listDocuments
      tags: [documents]
      summary: List documents for a booking
      parameters:
        - name: bookingId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: List of documents
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Document"

  /documents:
    post:
      operationId: saveDocument
      tags: [documents]
      summary: Save uploaded document metadata
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SaveDocumentRequest"
      responses:
        "201":
          description: Document saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Document"

  /documents/{id}/delete:
    delete:
      operationId: deleteDocument
      tags: [documents]
      summary: Delete a document
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /notifications/send:
    post:
      operationId: sendNotification
      tags: [notifications]
      summary: Send a custom notification to a customer (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendNotificationRequest"
      responses:
        "200":
          description: Notification sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /admin/stats:
    get:
      operationId: getAdminStats
      tags: [admin]
      summary: Get dashboard statistics
      responses:
        "200":
          description: Stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminStats"

  /admin/customers:
    get:
      operationId: listCustomers
      tags: [admin]
      summary: List all customers
      responses:
        "200":
          description: Customers list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"

  /admin/broadcast:
    post:
      operationId: sendBroadcast
      tags: [admin]
      summary: Send broadcast message to customers (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BroadcastRequest"
      responses:
        "200":
          description: Broadcast sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BroadcastResponse"

  /admin/reports/bookings:
    get:
      operationId: getBookingsReport
      tags: [admin]
      summary: Get bookings report (admin)
      parameters:
        - name: from
          in: query
          schema:
            type: string
        - name: to
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Bookings report data
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Booking"

  /admin/reports/customers:
    get:
      operationId: getCustomersReport
      tags: [admin]
      summary: Get customers report (admin)
      responses:
        "200":
          description: Customers report data
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object

  /admin/reports/payments:
    get:
      operationId: getPaymentsReport
      tags: [admin]
      summary: Get payments report (admin)
      responses:
        "200":
          description: Payments report data
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object

  /bookings/by-number/{bookingNumber}/invoice-public:
    get:
      operationId: getPublicInvoice
      tags: [bookings]
      summary: Get public invoice by booking number (no auth)
      parameters:
        - name: bookingNumber
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Invoice data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Invoice"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /bookings/by-invoice-number/{invoiceNumber}/invoice-public:
    get:
      operationId: getPublicInvoiceByNumber
      tags: [bookings]
      summary: Get public invoice by invoice number (no auth)
      parameters:
        - name: invoiceNumber
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Invoice data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Invoice"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /inquiry:
    post:
      operationId: submitInquiry
      tags: [inquiry]
      summary: Submit a public inquiry
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InquiryRequest"
      responses:
        "200":
          description: Inquiry submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /admin/inquiries:
    get:
      operationId: listInquiries
      tags: [admin]
      summary: List all inquiries (admin)
      responses:
        "200":
          description: Inquiries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Inquiry"

  /groups:
    get:
      tags: [groups]
      operationId: listGroups
      summary: List all Hajj groups (admin only)
      security:
        - cookieAuth: []
      responses:
        "200":
          description: List of groups with pilgrim counts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/HajjGroupWithCount"
    post:
      tags: [groups]
      operationId: createGroup
      summary: Create a new Hajj group (admin only)
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/HajjGroupInput"
      responses:
        "201":
          description: Group created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HajjGroup"

  /groups/{id}:
    get:
      tags: [groups]
      operationId: getGroup
      summary: Get a single group (admin only)
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Group details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HajjGroup"
    put:
      tags: [groups]
      operationId: updateGroup
      summary: Update a group (admin only)
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/HajjGroupInput"
      responses:
        "200":
          description: Group updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HajjGroup"
    delete:
      tags: [groups]
      operationId: deleteGroup
      summary: Delete a group and its pilgrims (admin only)
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Group deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string

  /groups/{groupId}/pilgrims:
    get:
      tags: [groups]
      operationId: listPilgrims
      summary: List pilgrims in a group (admin only)
      security:
        - cookieAuth: []
      parameters:
        - name: groupId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: List of pilgrims
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GroupPilgrim"
    post:
      tags: [groups]
      operationId: createPilgrim
      summary: Add a pilgrim to a group (admin only)
      security:
        - cookieAuth: []
      parameters:
        - name: groupId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GroupPilgrimInput"
      responses:
        "201":
          description: Pilgrim created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GroupPilgrim"

  /groups/{groupId}/pilgrims/{pilgrimId}:
    put:
      tags: [groups]
      operationId: updatePilgrim
      summary: Update a pilgrim (admin only)
      security:
        - cookieAuth: []
      parameters:
        - name: groupId
          in: path
          required: true
          schema:
            type: string
        - name: pilgrimId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GroupPilgrimInput"
      responses:
        "200":
          description: Pilgrim updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GroupPilgrim"
    delete:
      tags: [groups]
      operationId: deletePilgrim
      summary: Delete a pilgrim (admin only)
      security:
        - cookieAuth: []
      parameters:
        - name: groupId
          in: path
          required: true
          schema:
            type: string
        - name: pilgrimId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Pilgrim deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string

  /groups/{groupId}/pilgrims/{pilgrimId}/photo:
    post:
      tags: [groups]
      operationId: uploadPilgrimPhoto
      summary: Upload pilgrim photo (admin only)
      security:
        - cookieAuth: []
      parameters:
        - name: groupId
          in: path
          required: true
          schema:
            type: string
        - name: pilgrimId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                photo:
                  type: string
                  format: binary
      responses:
        "200":
          description: Photo uploaded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GroupPilgrim"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        message:
          type: string
        error:
          type: string
      required:
        - message

    MessageResponse:
      type: object
      properties:
        message:
          type: string
      required:
        - message

    SendOtpRequest:
      type: object
      properties:
        mobile:
          type: string
      required:
        - mobile

    SendOtpResponse:
      type: object
      properties:
        message:
          type: string
        requestId:
          type: string
      required:
        - message

    VerifyOtpRequest:
      type: object
      properties:
        mobile:
          type: string
        otp:
          type: string
      required:
        - mobile
        - otp

    AuthResponse:
      type: object
      properties:
        message:
          type: string
        user:
          $ref: "#/components/schemas/User"
        token:
          type: string
      required:
        - message
        - user

    User:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        mobile:
          type: string
        email:
          type: string
        role:
          type: string
          enum: [customer, admin]
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - mobile
        - role

    Package:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        type:
          type: string
          enum: [umrah, ramadan_umrah, hajj, special_hajj, iraq_ziyarat, baitul_muqaddas, syria_ziyarat, jordan_heritage]
        description:
          type: string
        duration:
          type: string
        pricePerPerson:
          type: number
        gstPercent:
          type: number
        includes:
          type: array
          items:
            type: string
        highlights:
          type: array
          items:
            type: string
        departureDates:
          type: array
          items:
            type: string
        details:
          type: object
          properties:
            airline:
              type: string
            departureCities:
              type: array
              items:
                type: string
            returnDate:
              type: string
            hotelMakkah:
              type: string
            hotelMadinah:
              type: string
            hotelCategoryMakkah:
              type: string
            hotelCategoryMadinah:
              type: string
            distanceMakkah:
              type: string
            distanceMadinah:
              type: string
            roomType:
              type: string
            mealPlan:
              type: string
            transport:
              type: string
            visa:
              type: string
        maxPilgrims:
          type: number
        imageUrl:
          type: string
        featured:
          type: boolean
        isActive:
          type: boolean
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - type
        - pricePerPerson
        - gstPercent
        - isActive

    CreatePackageRequest:
      type: object
      properties:
        name:
          type: string
        type:
          type: string
          enum: [umrah, ramadan_umrah, hajj, special_hajj, iraq_ziyarat, baitul_muqaddas, syria_ziyarat, jordan_heritage]
        description:
          type: string
        duration:
          type: string
        pricePerPerson:
          type: number
        gstPercent:
